name: Deploy Customer Portal

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: prohelper-customers-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:run

      - name: Build application
        run: npm run build

      - name: Debug deploy credentials
        shell: bash
        run: |
          set -eu
          cat > /tmp/deploy_key <<'EOF'
          ${{ secrets.DEPLOY_SSH_KEY }}
          EOF
          chmod 600 /tmp/deploy_key
          echo "DEPLOY_HOST=${{ secrets.DEPLOY_HOST }}"
          echo "DEPLOY_USER=${{ secrets.DEPLOY_USER }}"
          ssh-keygen -lf /tmp/deploy_key
          ssh-keygen -y -f /tmp/deploy_key
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "echo SSH_OK"

      - name: Prepare deploy path
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            find "${{ secrets.DEPLOY_PATH }}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Upload dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      - name: Finalize deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            if [ -n "${{ secrets.DEPLOY_POST_COMMAND }}" ]; then
              eval "${{ secrets.DEPLOY_POST_COMMAND }}"
            fi
